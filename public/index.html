<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>shootingtank.io</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #2a2a2a;
      font-family: Arial;
      color: #eee
    }

    html,
    body {
      overflow: hidden;
      touch-action: none;
    }


    #game {
      display: block;
      margin: 0 auto;
      background: #9aa0a6;
      box-shadow: 0 0 10px rgba(0, 0, 0, .6)
    }

    #hud {
      position: fixed;
      left: 10px;
      top: 10px;
      z-index: 40;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px;
      border-radius: 6px
    }

    #leader {
      position: fixed;
      right: 10px;
      top: 10px;
      z-index: 40;
      background: rgba(0, 0, 0, 0.35);
      padding: 8px;
      border-radius: 6px
    }

    #minimap {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 40;
      background: rgba(0, 0, 0, 0.35);
      padding: 6px;
      border-radius: 6px
    }

    #help {
      position: fixed;
      left: 10px;
      bottom: 10px;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5
    }

    #upgradeUI {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      display: none;
      background: rgba(0, 0, 0, 0.9);
      padding: 18px;
      border-radius: 8px
    }

    #upgradeUI button {
      display: block;
      margin: 8px;
      padding: 10px 14px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer
    }

    li {
      margin-bottom: 6px
    }

    #joystickContainer {
      position: fixed;
      bottom: 50px;
      left: 100px;
      width: 160px;
      height: 160px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 50%;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
    }


    #joystick {
      width: 80px;
      height: 80px;
      background: #4dd0e1;
      border-radius: 50%;
    }



    #autoFireBtn {
      position: fixed;
      right: 30px;
      bottom: 150px;
      z-index: 1000;
      padding: 10px 16px;
      font-size: 14px;
      border: none;
      background: #4caf50;
      color: white;
      border-radius: 6px;
    }


    #joystickContainer {
      touch-action: none;
      -ms-touch-action: none;
    }

    @media (hover: hover) and (pointer: fine) {
      #autoFireBtn {
        display: none;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      #joystickContainer {
        display: none;
      }
    }

    @media (hover: hover) and (pointer: fine) {
      #joystickContainerRight {
        display: none !important;
      }
    }

    #joystickContainer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      touch-action: none;
      z-index: 1000;
    }

    #joystickContainerRight {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      touch-action: none;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #joystickRight {
      width: 80px;
      height: 80px;
      background: #f06292;
      border-radius: 50%;
    }

    #login {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #1e1e1e, #000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #login h2 {
      font-size: 42px;
      margin-bottom: 20px;
      color: #4dd0e1;
      letter-spacing: 2px;
    }

    #login input {
      width: 240px;
      padding: 12px;
      font-size: 18px;
      border-radius: 6px;
      border: none;
      outline: none;
      text-align: center;
      margin-bottom: 12px;
    }

    #login button {
      margin-top: 16px;
      padding: 12px 40px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #4dd0e1, #2196f3);
      color: #000;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 0, 0, .4);
      transition: transform .15s, box-shadow .15s;
    }

    #login button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .6);
    }

    #hud {
      font-size: 15px;
      line-height: 1.5;
      max-width: calc(100vw - 20px);
    }

    #upgradeUI {
      position: fixed;
      left: 220px;
      top: 260px;
      z-index: 100;
      display: none;
      background: transparent;
      user-select: none;
    }

    #pointsAvail {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px #000;
      margin-bottom: 5px;
      font-style: italic;
      padding-left: 110px;
      /* Căn lề theo các nút bấm */
    }

    .upgrade-row {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      height: 24px;
      transition: transform 0.1s;
    }

    /* Tìm và thay thế đoạn này */
    .upgrade-row:hover {
      /* transform: translateX(5px);  <-- Xóa dòng này vì gây rung */
      background: rgba(255, 255, 255, 0.05);
      /* Thêm nền nhẹ thay thế */
      border-radius: 15px;
    }

    .upgrade-name {
      width: 120px;
      background: rgba(85, 85, 85, 0.9);
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 0 10px;
      height: 100%;
      display: flex;
      align-items: center;
      border-radius: 15px 0 0 15px;
      text-transform: uppercase;
      box-shadow: inset 0 -2px rgba(0, 0, 0, 0.2);
    }

    .upgrade-level-bar {
      display: flex;
      background: rgba(40, 40, 40, 0.9);
      height: 100%;
      padding: 3px 4px;
      gap: 3px;
      align-items: center;
      min-width: 100px;
    }

    .level-unit {
      width: 10px;
      height: 14px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 1px;
    }

    /* Đổ màu cho từng loại thuộc tính khi đã nâng cấp */
    .level-unit.btn-regen.filled {
      background: #ffbd91;
    }

    .level-unit.btn-hp.filled {
      background: #ff8df6;
    }

    .level-unit.btn-body.filled {
      background: #fff181;
    }

    .level-unit.btn-bspeed.filled {
      background: #629aff;
    }

    .level-unit.btn-range.filled {
      background: #9287ff;
    }

    .level-unit.btn-dmg.filled {
      background: #ff7d7d;
    }

    .level-unit.btn-reload.filled {
      background: #85ff85;
    }

    .level-unit.btn-mspeed.filled {
      background: #81ffff;
    }

    .upgrade-btn {
      width: 35px;
      height: 100%;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 18px;
      color: rgba(0, 0, 0, 0.5);
      /* Nút + màu đen mờ như ảnh */
      border-radius: 0 15px 15px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 -3px rgba(0, 0, 0, 0.2);
    }

    .upgrade-btn:active {
      box-shadow: none;
      transform: translateY(1px);
    }

    /* Màu nền của các nút tương ứng */
    .btn-regen {
      background: #ffbd91;
    }

    .btn-hp {
      background: #ff8df6;
    }

    .btn-body {
      background: #fff181;
    }

    .btn-bspeed {
      background: #629aff;
    }

    .btn-range {
      background: #9287ff;
    }

    .btn-dmg {
      background: #ff7d7d;
    }

    .btn-reload {
      background: #85ff85;
    }

    .btn-mspeed {
      background: #81ffff;
    }

    #closeUpgrade {
      position: absolute;
      top: 5px;
      right: 8px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }


    /* #game {
      image-rendering: pixelated;
      -webkit-tap-highlight-color: transparent;
    } */
  </style>
</head>

<body>
  <div id="login" style="
  position:fixed;inset:0;
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:2000">
    <h2>SHOOTINGTANK.IO</h2>
    <input id="nameInput" placeholder="Enter Username" style="padding:10px;font-size:18px">
    <button onclick="startGame()" style="margin-top:10px">
      PLAY
    </button>
  </div>

  <canvas id="game"></canvas>

  <!-- <div id="hud">
    Name: <span id="pid">-</span> | Level: <span id="lvl">-</span> | XP: <span id="xp">0</span>/<span id="xpTo">0</span> |
    HP: <span id="hp">0</span> | Score: <span id="score">0</span>
  </div> -->
  <div id="hud">
    <div>
      Name: <span id="pid">-</span> |
      Lv: <span id="lvl">-</span>
    </div>
    <div>
      HP: <span id="hp">0</span> |
      Score: <span id="score">0</span>
    </div>
    <div>
      XP: <span id="xp">0</span>/<span id="xpTo">0</span>
    </div>
  </div>


  <div id="leader"><b>Leaderboard</b>
    <ol id="lb"></ol>
  </div>

  <div id="minimap"><canvas id="mini" width="200" height="120"></canvas></div>

  <div id="help">
    <b>Hướng dẫn:</b><br>
    - Di chuyển: WASD hoặc ↑↓←→ hoặc joystick trái<br>
    - Xoay nòng súng + bắn: Sử dụng chuột hoặc joystick phải<br>
    - Nhấn <b>F</b>: Bật/Tắt auto-fire<br>
    - Lên cấp: chọn nâng cấp<br>
  </div>

  <div id="upgradeUI">
    <button id="closeUpgrade">✖</button>
    <div class="hint">Bạn đã lên cấp! Chọn 1 nâng cấp:</div>
    <div id="upgradeButtons"></div>
  </div>


  <div id="joystickContainer">
    <div id="joystick"></div>
  </div>
  <div id="joystickContainerRight">
    <div id="joystickRight"></div>
  </div>


  <button id="autoFireBtn" onclick="toggleAutoFire()">Auto Fire: OFF</button>


  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const mini = document.getElementById('mini');
    const mctx = mini.getContext('2d');

    const pidEl = document.getElementById('pid');
    const lvlEl = document.getElementById('lvl');
    const xpEl = document.getElementById('xp');
    const xpToEl = document.getElementById('xpTo');
    const hpEl = document.getElementById('hp');
    const scoreEl = document.getElementById('score');
    const lbEl = document.getElementById('lb');
    let lastUpgradePoints = 0;
    let upgradeMenuClosed = false;

    const upgradeUI = document.getElementById('upgradeUI');
    const upgradeButtonsDiv = document.getElementById('upgradeButtons');

    let clientId = null;
    let worldSize = { w: 3000, h: 2000 };

    let state = { players: [], bullets: [], obstacles: [] };
    let socket;

    let origin = { x: 0, y: 0 };
    let joystickPos = { x: 0, y: 0 };
    let active = false;
    let originR = { x: 0, y: 0 };
    let joystickPosR = { x: 0, y: 0 };
    let activeR = false;
    const joystickRight = document.getElementById('joystickRight');
    const containerRight = document.getElementById('joystickContainerRight');

    let rightTouchId = null;
    const STATS_CONFIG = [
      { id: 'regen', label: 'Health Regen', color: 'btn-regen' },
      { id: 'hpMax', label: 'Max Health', color: 'btn-hp' },
      // { id: 'bodyDamage', label: 'Body Damage', color: 'btn-body' },
      { id: 'bulletSpeed', label: 'Bullet Speed', color: 'btn-bspeed' },
      { id: 'bulletRange', label: 'Bullet Range', color: 'btn-range' },
      { id: 'damage', label: 'Bullet Damage', color: 'btn-dmg' },
      { id: 'fireRate', label: 'Reload', color: 'btn-reload' },
      { id: 'speed', label: 'Move Speed', color: 'btn-mspeed' }
    ];
    containerRight.addEventListener('touchstart', e => {
      for (const touch of e.changedTouches) {
        if (rightTouchId === null) {
          rightTouchId = touch.identifier;
          activeR = true;
          const rect = containerRight.getBoundingClientRect();
          originR.x = rect.left + rect.width / 2;
          originR.y = rect.top + rect.height / 2;
          moveJoystickRight(touch.clientX, touch.clientY);
        }
      }
    }, { passive: false });

    containerRight.addEventListener('touchmove', e => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === rightTouchId) {
          moveJoystickRight(touch.clientX, touch.clientY);
          e.preventDefault();
        }
      }
    }, { passive: false });

    containerRight.addEventListener('touchend', e => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === rightTouchId) {
          activeR = false;
          rightTouchId = null;
          joystickRight.style.transform = `translate(0px, 0px)`;
          inputs.firing = false;
          sendInputs();
        }
      }
    }, { passive: false });


    function moveJoystickRight(x, y) {
      const dx = x - originR.x;
      const dy = y - originR.y;
      const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 40);
      const angle = Math.atan2(dy, dx);
      joystickPosR.x = Math.cos(angle) * dist;
      joystickPosR.y = Math.sin(angle) * dist;
      joystickRight.style.transform = `translate(${joystickPosR.x}px, ${joystickPosR.y}px)`;

      const player = state.players.find(p => p.id === clientId);
      if (player) {
        inputs.aimX = player.x + Math.cos(angle) * 100;
        inputs.aimY = player.y + Math.sin(angle) * 100;
        inputs.firing = true;
        sendInputs();
      }
    }
    canvas.addEventListener('touchstart', e => {
      const me = state.players.find(p => p.id === clientId);
      if (!me) return;

      for (const touch of e.touches) {
        const x = touch.clientX;
        const y = touch.clientY;

        const leftRect = container.getBoundingClientRect();
        const rightRect = containerRight.getBoundingClientRect();
        const inLeftJoy = x >= leftRect.left && x <= leftRect.right && y >= leftRect.top && y <= leftRect.bottom;
        const inRightJoy = x >= rightRect.left && x <= rightRect.right && y >= rightRect.top && y <= rightRect.bottom;
        if (inLeftJoy || inRightJoy) continue;

        const rect = canvas.getBoundingClientRect();
        const relX = x - rect.left;
        const relY = y - rect.top;
        inputs.aimX = viewport.x + relX;
        inputs.aimY = viewport.y + relY;
        inputs.firing = true;
        sendInputs();
      }
    }, { passive: false });


    canvas.addEventListener('touchmove', e => {
      const me = state.players.find(p => p.id === clientId);
      if (!me) return;

      for (const touch of e.touches) {
        const x = touch.clientX;
        const y = touch.clientY;

        const leftRect = container.getBoundingClientRect();
        const rightRect = containerRight.getBoundingClientRect();
        const inLeftJoy = x >= leftRect.left && x <= leftRect.right && y >= leftRect.top && y <= leftRect.bottom;
        const inRightJoy = x >= rightRect.left && x <= rightRect.right && y >= rightRect.top && y <= rightRect.bottom;
        if (inLeftJoy || inRightJoy) continue;

        const rect = canvas.getBoundingClientRect();
        const relX = x - rect.left;
        const relY = y - rect.top;
        inputs.aimX = viewport.x + relX;
        inputs.aimY = viewport.y + relY;
        inputs.firing = true;
        sendInputs();
      }
      e.preventDefault();
    }, { passive: false });


    canvas.addEventListener('touchend', e => {
      let stillOutside = false;
      for (const touch of e.touches) {
        const x = touch.clientX;
        const y = touch.clientY;

        const leftRect = container.getBoundingClientRect();
        const rightRect = containerRight.getBoundingClientRect();
        const inLeftJoy = x >= leftRect.left && x <= leftRect.right && y >= leftRect.top && y <= leftRect.bottom;
        const inRightJoy = x >= rightRect.left && x <= rightRect.right && y >= rightRect.top && y <= rightRect.bottom;
        if (!inLeftJoy && !inRightJoy) {
          stillOutside = true;
          break;
        }
      }
      inputs.firing = stillOutside;
      sendInputs();
    }, { passive: false });


    function toggleAutoFire() {
      inputs.autoFire = !inputs.autoFire;
      const btn = document.getElementById('autoFireBtn');
      btn.textContent = 'Auto Fire: ' + (inputs.autoFire ? 'ON' : 'OFF');
      btn.style.background = inputs.autoFire ? '#e91e63' : '#4caf50';
      sendInputs();
    }

    function connect(playerName) {
      socket = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host);
      socket.onopen = () => {
        socket.send(JSON.stringify({
          type: "join",
          name: playerName
        }));
      };
      socket.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'welcome') {
          clientId = msg.id;
          pidEl.textContent = playerName;
          if (msg.worldSize) worldSize = msg.worldSize;
        } else if (msg.type === 'state') {
          state = msg;
          const me = state.players.find(p => p.id === clientId);

          if (me) {
            // nếu có điểm nâng cấp mới → cho phép mở lại menu
            if (me.upgradePoints > lastUpgradePoints) {
              upgradeClosed = false;
            }

            // hiển thị menu nếu còn điểm và chưa bị đóng thủ công
            if (me.upgradePoints > 0 && !upgradeClosed) {
              showUpgradeMenu();
              upgradeUI.style.display = 'block';
            }

            // hết điểm → ẩn menu
            if (me.upgradePoints <= 0) {
              upgradeUI.style.display = 'none';
            }

            // lưu lại số điểm hiện tại
            lastUpgradePoints = me.upgradePoints;



          }
          else {
            upgradeUI.style.display = 'none';
            upgradeUI.dataset.lastState = "";
          }
          lbEl.innerHTML = "";
          if (msg.leaderboard) {
            msg.leaderboard.forEach(e => {
              const li = document.createElement('li');
              li.textContent = `${e.name} — Lv${e.level} — ${e.score}`;
              lbEl.appendChild(li);
            });
          }
        } else if (msg.type === 'levelup') {
          showUpgradeMenu();
        }
      };
      socket.onclose = () => setTimeout(connect, 1200);
    }
    // connect();

    const inputs = {
      up: false, down: false, left: false, right: false,
      aimX: 0, aimY: 0, firing: false, autoFire: false
    };

    window.addEventListener('keydown', e => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key === 'w' || e.key === 'ArrowUp') inputs.up = true;
      if (e.key === 's' || e.key === 'ArrowDown') inputs.down = true;
      if (e.key === 'a' || e.key === 'ArrowLeft') inputs.left = true;
      if (e.key === 'd' || e.key === 'ArrowRight') inputs.right = true;
      if (e.key === 'f') inputs.autoFire = !inputs.autoFire;
      sendInputs();
    }, { passive: false });

    window.addEventListener('keyup', e => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key === 'w' || e.key === 'ArrowUp') inputs.up = false;
      if (e.key === 's' || e.key === 'ArrowDown') inputs.down = false;
      if (e.key === 'a' || e.key === 'ArrowLeft') inputs.left = false;
      if (e.key === 'd' || e.key === 'ArrowRight') inputs.right = false;
      sendInputs();
    }, { passive: false });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      inputs.aimX = viewport.x + (e.clientX - rect.left);
      inputs.aimY = viewport.y + (e.clientY - rect.top);
      sendInputs();
    });

    canvas.addEventListener('mousedown', () => { inputs.firing = true; sendInputs(); });
    canvas.addEventListener('mouseup', () => { inputs.firing = false; sendInputs(); });

    function sendInputs() {
      if (socket && socket.readyState === WebSocket.OPEN)
        socket.send(JSON.stringify({ type: 'input', data: inputs }));
    }

    const viewport = { w: canvas.width, h: canvas.height, x: 0, y: 0 };

    const joystick = document.getElementById('joystick');
    const container = document.getElementById('joystickContainer');

    let leftTouchId = null;


    container.addEventListener('touchstart', e => {
      for (const touch of e.changedTouches) {
        if (leftTouchId === null) {
          leftTouchId = touch.identifier;
          active = true;
          const rect = container.getBoundingClientRect();
          origin.x = rect.left + rect.width / 2;
          origin.y = rect.top + rect.height / 2;
          moveJoystick(touch.clientX, touch.clientY);
        }
      }
    }, { passive: false });

    container.addEventListener('touchmove', e => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === leftTouchId) {
          moveJoystick(touch.clientX, touch.clientY);
          e.preventDefault();
        }
      }
    }, { passive: false });

    container.addEventListener('touchend', e => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === leftTouchId) {
          active = false;
          leftTouchId = null;
          joystick.style.transform = `translate(0px, 0px)`;
          inputs.up = inputs.down = inputs.left = inputs.right = false;
          sendInputs();
        }
      }
    }, { passive: false });
    function moveJoystick(x, y) {
      const dx = x - origin.x;
      const dy = y - origin.y;
      const dist = Math.min(Math.sqrt(dx * dx + dy * dy), 40);
      const angle = Math.atan2(dy, dx);
      joystickPos.x = Math.cos(angle) * dist;
      joystickPos.y = Math.sin(angle) * dist;
      joystick.style.transform = `translate(${joystickPos.x}px, ${joystickPos.y}px)`;

      const dirX = Math.cos(angle);
      const dirY = Math.sin(angle);

      const threshold = 0.4;
      inputs.up = dirY < -threshold;
      inputs.down = dirY > threshold;
      inputs.left = dirX < -threshold;
      inputs.right = dirX > threshold;

      sendInputs();
    }


    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const me = state.players.find(p => p.id === clientId);
      if (me) {
        viewport.x = me.x - viewport.w / 2;
        viewport.y = me.y - viewport.h / 2;
        pidEl.textContent = me.name;
        lvlEl.textContent = me.level;
        xpEl.textContent = Math.round(me.xp);
        xpToEl.textContent = Math.round(me.xpToLevel);
        hpEl.textContent = Math.round(me.hp);
        scoreEl.textContent = Math.round(me.score);
      }

      ctx.fillStyle = '#9aa0a6';
      ctx.fillRect(0, 0, viewport.w, viewport.h);
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      for (let gx = Math.floor(viewport.x / 200) * 200; gx < viewport.x + viewport.w; gx += 200) {
        ctx.beginPath(); ctx.moveTo(gx - viewport.x, 0); ctx.lineTo(gx - viewport.x, viewport.h); ctx.stroke();
      }
      for (let gy = Math.floor(viewport.y / 200) * 200; gy < viewport.y + viewport.h; gy += 200) {
        ctx.beginPath(); ctx.moveTo(0, gy - viewport.y); ctx.lineTo(viewport.w, gy - viewport.y); ctx.stroke();
      }

      state.obstacles.forEach(o => {
        if (o.hp <= 0) return;
        const sx = o.x - viewport.x;
        const sy = o.y - viewport.y;
        ctx.fillStyle = '#444';
        if (o.type === 'rect') {
          ctx.fillRect(sx, sy, o.w, o.h);
        }
        else if (o.type === 'hex') {
          const s = o.size / 2;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = Math.PI / 3 * i;
            const x = sx + Math.cos(a) * s;
            const y = sy + Math.sin(a) * s;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
        } else if (o.type === 'tri') {
          const s = o.size || 40;
          ctx.beginPath();
          ctx.moveTo(sx, sy - s / 2);
          ctx.lineTo(sx + s / 2, sy + s / 2);
          ctx.lineTo(sx - s / 2, sy + s / 2);
          ctx.closePath();
          ctx.fill();
        }
        const hpPerc = o.hp / o.maxHp;
        if (o.type === 'rect') {
          ctx.fillStyle = '#000';
          ctx.fillRect(sx + 4, sy + 4, o.w - 8, 5);
          ctx.fillStyle = '#2ecc71';
          ctx.fillRect(sx + 4, sy + 4, (o.w - 8) * hpPerc, 5);
        } if (o.type === 'rect') {
          ctx.fillStyle = '#000';
          ctx.fillRect(sx + 4, sy + 4, o.w - 8, 5);
          ctx.fillStyle = '#2ecc71';
          ctx.fillRect(sx + 4, sy + 4, (o.w - 8) * hpPerc, 5);
        }
        else if (o.type === 'tri' || o.type === 'hex') {
          ctx.fillStyle = '#000';
          ctx.fillRect(sx - 20, sy - 10, 40, 4);
          ctx.fillStyle = '#2ecc71';
          ctx.fillRect(sx - 20, sy - 10, 40 * hpPerc, 4);
        }
      });

      ctx.fillStyle = '#ffd86b';
      state.bullets.forEach(b => {
        ctx.beginPath();
        // ctx.arc(b.x - viewport.x, b.y - viewport.y, 4, 0, Math.PI * 2);
        ctx.arc(b.x - viewport.x, b.y - viewport.y, b.size, 0, Math.PI * 2);

        ctx.fill();
      });

      state.players.forEach(p => {
        const sx = p.x - viewport.x, sy = p.y - viewport.y;
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(p.angle || 0);
        ctx.fillStyle = (p.id === clientId) ? '#4dd0e1' : '#fff';
        // ctx.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
        //         if (p.tier === 1) {
        //   ctx.fillRect(-20, -20, 40, 40); 
        // }

        // if (p.tier === 2) {
        //   ctx.beginPath();
        //   ctx.arc(0, 0, 22, 0, Math.PI*2); 
        //   ctx.fill();
        // }

        // if (p.tier === 3) {
        //   const s = 22; // bán kính của lục giác
        //   ctx.beginPath();
        //   for (let i = 0; i < 6; i++) {
        //     const angle = Math.PI / 3 * i; // mỗi góc trong lục giác 60 độ
        //     const x = Math.cos(angle) * s;
        //     const y = Math.sin(angle) * s;
        //     if (i === 0) {
        //       ctx.moveTo(x, y);
        //     } else {
        //       ctx.lineTo(x, y);
        //     }
        //   }
        //   ctx.closePath();
        //   ctx.fill();
        // }
        // ===== VẼ THÂN TANK =====
        if (p.tier === 1) {
          // TAM GIÁC
          ctx.beginPath();
          ctx.moveTo(0, -22);    // đỉnh trên
          ctx.lineTo(20, 18);    // góc phải
          ctx.lineTo(-20, 18);   // góc trái
          ctx.closePath();
          ctx.fill();
        }

        else if (p.tier === 2) {
          // HÌNH VUÔNG / CHỮ NHẬT
          ctx.fillRect(-22, -22, 44, 44);
        }

        else if (p.tier === 3) {
          // LỤC GIÁC (giữ nguyên)
          const s = 22;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const angle = Math.PI / 3 * i;
            const x = Math.cos(angle) * s;
            const y = Math.sin(angle) * s;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fill();
        }


        // ctx.fillStyle = '#222';
        // ctx.fillRect(0, -5, p.size + 15, 10);
        // VẼ NÒNG
        ctx.fillStyle = '#222';

        if (p.tier >= 3) {
          ctx.fillRect(6, -10, 28, 6);
          ctx.fillRect(6, 4, 28, 6);
        } else if (p.tier === 2) {
          ctx.fillRect(6, -7, 30, 14); // nòng to
        } else {
          ctx.fillRect(6, -5, 26, 10);
        }

        ctx.restore();
        const hpPerc = p.hp / p.maxHp;
        ctx.fillStyle = '#000';
        ctx.fillRect(sx - 25, sy - p.size - 14, 50, 6);
        ctx.fillStyle = hpPerc > 0.5 ? '#2ecc71' : (hpPerc > 0.2 ? '#f1c40f' : '#e74c3c');
        ctx.fillRect(sx - 25, sy - p.size - 14, 50 * hpPerc, 6);
      });

      ctx.save();
      ctx.fillStyle = 'rgba(200,200,200,0.6)';
      ctx.beginPath();
      ctx.rect(0, 0, viewport.w, viewport.h);
      ctx.rect(worldSize.w - viewport.x, worldSize.h - viewport.y, -worldSize.w, -worldSize.h);
      ctx.fill('evenodd');
      ctx.restore();

      ctx.strokeStyle = '#444';
      ctx.lineWidth = 4;
      ctx.strokeRect(-viewport.x, -viewport.y, worldSize.w, worldSize.h);

      drawMini();
      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    function drawMini() {
      mctx.clearRect(0, 0, mini.width, mini.height);
      mctx.fillStyle = '#111';
      mctx.fillRect(0, 0, mini.width, mini.height);
      const sx = mini.width / worldSize.w, sy = mini.height / worldSize.h;
      state.obstacles.forEach(o => {
        mctx.fillStyle = '#555';
        mctx.fillRect(o.x * sx, o.y * sy, 6, 6);
      });
      state.players.forEach(p => {
        mctx.fillStyle = (p.id === clientId) ? '#4dd0e1' : '#fff';
        mctx.fillRect(p.x * sx - 2, p.y * sy - 2, 4, 4);
      });
    }

    let currentUpgradeChoices = null;
    const ALL_UPGRADES = [
      { id: 'hpMax', label: 'Max HP +', desc: 'Tăng máu tối đa' },
      { id: 'regen', label: 'Regen +', desc: 'Tăng hồi máu/giây' },
      { id: 'speed', label: 'Speed +', desc: 'Tăng tốc chạy' },
      { id: 'fireRate', label: 'Fire rate +', desc: 'Tốc độ bắn nhanh hơn' },
      { id: 'damage', label: 'Damage +', desc: 'Tăng sát thương' },
      { id: 'bulletSpeed', label: 'Bullet speed +', desc: 'Tăng tốc đạn' },
      { id: 'bulletLife', label: 'Range +', desc: 'Tăng tầm bắn' }
    ];

    // function showUpgradeMenu(level) {
    //   const choices = [];
    //   const pool = ALL_UPGRADES.slice();
    //   for (let i = 0; i < 3; i++) {
    //     const idx = Math.floor(Math.random() * pool.length);
    //     choices.push(pool.splice(idx, 1)[0]);
    //   }
    //   currentUpgradeChoices = choices;
    //   upgradeButtonsDiv.innerHTML = '';
    //   choices.forEach((c, i) => {
    //     const btn = document.createElement('button');
    //     btn.textContent = `${i + 1}. ${c.label} — ${c.desc}`;
    //     btn.onclick = () => chooseUpgrade(c.id);
    //     upgradeButtonsDiv.appendChild(btn);
    //   });
    //   upgradeUI.style.display = 'block';
    function showUpgradeMenu() {
      // if (upgradeUI.style.display === 'none' && upgradeUI.dataset.manuallyClosed === 'true') return;
      const me = state.players.find(p => p.id === clientId);
      if (!me) return;

      // nếu nhận điểm nâng cấp mới → cho phép mở lại menu
      if (upgradeUI.dataset.lastPoints != me.upgradePoints) {
        upgradeUI.dataset.manuallyClosed = "false";
        upgradeUI.dataset.lastPoints = me.upgradePoints;
      }

      // nếu người chơi vừa đóng và chưa có điểm mới → không mở
      if (upgradeUI.dataset.manuallyClosed === "true") return;


      if (!me || me.upgradePoints <= 0) {
        upgradeUI.dataset.manuallyClosed = "false";
        return;
      }

      const totalUpgrades = Object.values(me.stats || {}).reduce((a, b) => a + b, 0);
      const maxPossibleUpgrades = STATS_CONFIG.length * 8;

      if (totalUpgrades >= maxPossibleUpgrades || me.upgradePoints <= 0) {
        upgradeUI.style.display = 'none';
        return;
      }

      // Tạo một chuỗi định danh trạng thái hiện tại (điểm + tổng level các skill)
      const currentStatsState = me.upgradePoints + JSON.stringify(me.stats);

      // Nếu trạng thái giống hệt lần render trước thì không làm gì cả (tránh lag/nháy)
      if (upgradeUI.dataset.lastState === currentStatsState) return;
      upgradeUI.dataset.lastState = currentStatsState;

      upgradeButtonsDiv.innerHTML = '';

      const pointsText = document.createElement('div');
      pointsText.id = 'pointsAvail';
      pointsText.textContent = `x${me.upgradePoints}`;
      upgradeButtonsDiv.appendChild(pointsText);

      STATS_CONFIG.forEach((stat) => {
        const row = document.createElement('div');
        row.className = 'upgrade-row';

        const nameSpan = document.createElement('div');
        nameSpan.className = 'upgrade-name';
        nameSpan.textContent = stat.label;

        const bar = document.createElement('div');
        bar.className = 'upgrade-level-bar';

        const currentLevel = (me.stats && me.stats[stat.id] !== undefined) ? me.stats[stat.id] : 0;

        for (let i = 0; i < 8; i++) {
          const unit = document.createElement('div');
          unit.className = 'level-unit' + (i < currentLevel ? ` filled ${stat.color}` : '');
          bar.appendChild(unit);
        }

        const btn = document.createElement('button');
        btn.className = `upgrade-btn ${stat.color}`;
        btn.textContent = '+';
        btn.onclick = (e) => {
          e.preventDefault();
          chooseUpgrade(stat.id);
        };

        row.appendChild(nameSpan);
        row.appendChild(bar);
        row.appendChild(btn);
        upgradeButtonsDiv.appendChild(row);
      });

    }
    function chooseUpgrade(choiceId) {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({
          type: 'upgrade',
          choice: choiceId
        }));
      }
    }

    function hideUpgradeMenu() {
      const upgradeUI = document.getElementById('upgradeUI'); // Đảm bảo lấy đúng ID
      if (upgradeUI) {
        upgradeUI.style.display = 'none';
      }
    }



    function hideUpgradeMenu() {
      upgradeUI.style.display = 'none';
    }

    window.addEventListener('touchmove', function (e) {
      e.preventDefault();
    }, { passive: false });
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      viewport.w = canvas.width;
      viewport.h = canvas.height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    window.addEventListener('touchmove', function (e) {
      e.preventDefault();
    }, { passive: false });

    container.addEventListener('touchstart', e => {
      e.preventDefault();
      active = true;
      const touch = e.touches[0];
      const rect = container.getBoundingClientRect();
      origin.x = rect.left + rect.width / 2;
      origin.y = rect.top + rect.height / 2;
      moveJoystick(touch.clientX, touch.clientY);
    }, { passive: false });
    function startGame() {
      const name = document.getElementById("nameInput").value || "Player";
      document.getElementById("login").style.display = "none";
      connect(name);
    }
    document.getElementById("closeUpgrade").onclick = () => {
      upgradeUI.style.display = "none";
      upgradeClosed = true;
    };

  </script>
